!! IOS-XR test configuration for parser coverage validation
hostname XR-CORE-01

vrf CUST-A
 address-family ipv4 unicast
  import route-target
   65000:100
  !
  export route-target
   65000:100
  !
  import route-policy IMPORT-CUST-A
  export route-policy EXPORT-CUST-A
 !
!

interface GigabitEthernet0/0/0/0
 description WAN-ISP1
 ipv4 address 203.0.113.2 255.255.255.252
 ipv4 access-group INBOUND-ISP1 ingress
 ipv4 access-group OUTBOUND-ISP1 egress
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description CORE-LINK
 ipv4 address 10.0.0.1 255.255.255.254
 vrf CUST-A
 no shutdown
!

ipv4 access-list INBOUND-ISP1
 10 deny ipv4 any host 10.0.0.1
 20 permit ipv4 any any
!
ipv4 access-list OUTBOUND-ISP1
 10 permit ipv4 10.0.0.0 0.255.255.255 any
 20 deny ipv4 any any
!
ipv6 access-list INBOUND-V6
 10 permit ipv6 any any
!

prefix-set ISP1-PREFIX-OUT
  10.0.0.0/16 le 24,
  192.168.0.0/16 le 24
end-set

prefix-set DEFAULT-ONLY
  0.0.0.0/0
end-set

as-path-set CUSTOMER-AS
  ios-regex '^65001_',
  ios-regex '^65002_'
end-set

community-set BGP-COMMUNITIES
  65000:100,
  65000:200
end-set

extcommunity-set rt RT-VPN1
  65000:1,
  65000:2
end-set

route-policy IMPORT-CUST-A
  if destination in ISP1-PREFIX-OUT then
    set local-preference 200
  endif
  pass
end-policy

route-policy EXPORT-CUST-A
  set community BGP-COMMUNITIES
  pass
end-policy

route-policy ISP1-IN
  if destination in DEFAULT-ONLY then
    set local-preference 100
  endif
  pass
end-policy

route-policy ISP1-OUT
  set med 100
  pass
end-policy

router static
 address-family ipv4 unicast
  0.0.0.0/0 203.0.113.1
  192.0.2.0/24 Null0 254
 !
 vrf CUST-A
  address-family ipv4 unicast
   0.0.0.0/0 10.0.0.2
  !
 !
!

router ospf 1
 router-id 10.255.255.1
 log adjacency changes
 auto-cost reference-bandwidth 100000
 area 0
  interface GigabitEthernet0/0/0/1
  !
  interface Loopback0
   passive enable
  !
 !
 area 10
  stub
  interface GigabitEthernet0/0/0/2
  !
 !
 redistribute bgp 65000 metric-type 2 route-policy EXPORT-CUST-A
!

router bgp 65000
 bgp router-id 10.255.255.1
 bgp log-neighbor-changes
 neighbor 203.0.113.1
  remote-as 65001
  description ISP1-PEER
  address-family ipv4 unicast
   route-policy ISP1-IN in
   route-policy ISP1-OUT out
  !
 !
 neighbor-group INTERNAL-PEERS
  remote-as 65000
  update-source Loopback0
  route-reflector-client
 !
 vrf CUST-A
  rd 65000:100
  neighbor 10.0.0.2
   remote-as 65100
   route-policy IMPORT-CUST-A in
   route-policy EXPORT-CUST-A out
  !
  redistribute connected route-policy EXPORT-CUST-A
 !
!

router pim
 address-family ipv4
  rp-address 10.255.255.1
  ssm range RFC1918
 !
!

multicast-routing
 address-family ipv4
 !
!

ntp
 server 203.0.113.100
 server 203.0.113.101
!

snmp-server community PUBLIC RO
snmp-server host 10.0.1.1 traps version 2c PUBLIC

logging 10.0.1.2
